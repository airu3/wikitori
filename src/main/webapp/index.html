<!DOCTYPE html>
<html lang="ja-JP" class="h-full">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Wikitori</title>
		<script src="https://cdn.tailwindcss.com"></script>
		<link
			rel="shortcut icon"
			href="img/TORII-removebg-preview.png"
			type="image/x-icon"
		/>
	</head>

	<body class="h-full bg-gradient-to-r from-indigo-900 to-blue-900">
		<div class="flex min-h-full flex-col lg:grid lg:grid-cols-2">
			<!-- Left side -->
			<div
				class="relative hidden flex-1 flex-col justify-center px-5 pt-8 text-white lg:flex lg:px-8"
			>
				<nav class="absolute left-0 top-8 flex w-full px-8">
					<h1 class="text-2xl font-bold">
						Wikitori <span class="inline-block">●</span>
					</h1>
				</nav>
				<div
					class="absolute left-0 top-1/2 flex w-full -translate-y-1/2 flex-col px-8"
				>
					<div class="text-5xl font-bold mb-8">しりとり</div>
					<div class="relative">
						<div class="space-x-2 text-3xl opacity-75">
							<span
								id="word1"
								class="inline-block transition-opacity duration-300"
								>り</span
							>
							<span
								id="word2"
								class="inline-block transition-opacity duration-300"
							></span>
							<span
								id="word3"
								class="inline-block transition-opacity duration-300"
							></span>
							<span
								id="word4"
								class="inline-block transition-opacity duration-300"
							></span>
							<span
								id="word5"
								class="inline-block transition-opacity duration-300"
							></span>
							<span
								id="word6"
								class="inline-block transition-opacity duration-300"
							></span>
							<span
								id="word7"
								class="inline-block transition-opacity duration-300"
							></span>
							<span class="inline-block">●</span>
						</div>
					</div>
				</div>
			</div>

			<!-- Right side -->
			<div
				class="flex flex-1 flex-col justify-center px-4 py-12 sm:px-6 lg:flex-none lg:px-20"
			>
				<div class="mx-auto w-full max-w-sm lg:w-96">
					<div class="text-center">
						<h2
							class="mt-6 text-2xl font-bold leading-9 tracking-tight text-white"
						>
							しりとりを始めましょう
						</h2>
					</div>

					<div class="mt-10">
						<form action="start" method="post" class="space-y-6">
							<div>
								<input
									type="text"
									id="username"
									name="user"
									maxlength="8"
									required
									class="block w-full rounded-md border-0 bg-white/5 py-2.5 text-white shadow-sm ring-1 ring-inset ring-white/10 focus:ring-2 focus:ring-inset focus:ring-indigo-500 sm:text-sm sm:leading-6"
									placeholder="Your name"
								/>
							</div>

							<div>
								<button
									type="submit"
									class="flex w-full justify-center rounded-md bg-indigo-500 px-3 py-2.5 text-sm font-semibold leading-6 text-white shadow-sm hover:bg-indigo-400 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500"
								>
									始める
								</button>
							</div>
						</form>
					</div>

					<div class="mt-10 text-center">
						<img src="img/1torii.png" alt="Torii" class="mx-auto w-24 mb-4" />
						<div class="text-sm text-gray-400">
							<span>Sato「お手柔らかに」</span>
							<span class="mx-2">|</span>
							<span>Yoshida「かかってこいよ」</span>
						</div>
					</div>
				</div>
			</div>
		</div>

		<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
		<script>
			class PlaceholderManager {
				constructor(element, placeholders) {
					this.element = element;
					this.placeholders = placeholders;
					this.currentIndex = null;
				}

				getRandomIndex() {
					let newIndex;
					do {
						newIndex = Math.floor(Math.random() * this.placeholders.length);
					} while (newIndex === this.currentIndex);
					return newIndex;
				}

				setPlaceholder() {
					this.currentIndex = this.getRandomIndex();
					this.element.placeholder = this.placeholders[this.currentIndex];
				}

				startUpdatingPlaceholder(interval) {
					setInterval(() => this.setPlaceholder(), interval);
				}
			}

			let inputElement = document.querySelector("#username");
			let placeholders = [
				"Your Name.",
				"君の名は。",
				"お名前は？",
				"お名前をどうぞ。",
				"名前を入力してね。",
				"あなたの名前は？",
				"なまえを いれてください",
				"なまえを いれてね",
				"なまえは？",
				"贅沢な名だね。",
			];

			let placeholderManager = new PlaceholderManager(
				inputElement,
				placeholders
			);
			placeholderManager.setPlaceholder();
			placeholderManager.startUpdatingPlaceholder(5000);
		</script>
	</body>
</html>
